<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>What Framework Playground</title>
  <meta name="description" content="Interactive playground for What Framework — a signal-based reactive web framework where components run once. Try it live in your browser.">
  <meta name="theme-color" content="#8b5cf6">

  <!-- Open Graph -->
  <meta property="og:title" content="What Framework Playground">
  <meta property="og:description" content="Signal-based reactive framework. Components run ONCE. Try it live.">
  <meta property="og:type" content="website">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

  <!-- Favicon (inline SVG) -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='6' fill='%238b5cf6'/><text x='50%25' y='55%25' dominant-baseline='central' text-anchor='middle' font-size='18' font-weight='bold' fill='white'>W</text></svg>">
</head>
<body>
  <div class="playground">
    <!-- Header -->
    <header class="header">
      <div class="header-left">
        <div class="header-logo">
          <div class="header-logo-icon">W</div>
          <span class="header-title"><span>What</span> Playground</span>
        </div>
        <div class="header-divider"></div>
        <span class="header-subtitle">Signal-based reactive framework</span>
      </div>

      <div class="header-center">
        <div class="example-selector-wrap">
          <label for="example-selector">Example</label>
          <select id="example-selector"></select>
          <span id="example-description"></span>
        </div>
      </div>

      <div class="header-right">
        <button class="toolbar-btn" id="btn-run" title="Re-run code (Cmd+S)">
          <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor">
            <polygon points="4,2 14,8 4,14"/>
          </svg>
          <span>Run</span>
        </button>
        <button class="toolbar-btn" id="btn-reset" title="Reset to example default">
          <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M2 8a6 6 0 0111.5-2.3M14 8a6 6 0 01-11.5 2.3"/>
            <polyline points="2 3 2 6.5 5.5 6.5"/>
            <polyline points="14 13 14 9.5 10.5 9.5"/>
          </svg>
          <span>Reset</span>
        </button>
        <button class="toolbar-btn primary" id="btn-share" title="Copy shareable link">
          <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M4 12V9a4 4 0 014-4h5"/>
            <polyline points="10 2 13 5 10 8"/>
          </svg>
          <span>Share</span>
        </button>
        <a class="toolbar-icon-btn" href="https://whatfw.com/docs" target="_blank" rel="noopener" title="Documentation">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M2 2h4l2 2 2-2h4v11H9l-1 1-1-1H2z"/>
            <path d="M8 4v10"/>
          </svg>
        </a>
        <a class="toolbar-icon-btn" href="https://github.com/CelsianJs/what-framework" target="_blank" rel="noopener" title="GitHub Repository">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor">
            <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/>
          </svg>
        </a>
        <button class="toolbar-icon-btn" id="btn-theme" title="Toggle theme">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
            <circle cx="8" cy="8" r="3"/>
            <path d="M8 1v2m0 10v2M1 8h2m10 0h2M2.9 2.9l1.4 1.4m7.4 7.4l1.4 1.4M13.1 2.9l-1.4 1.4M4.3 11.7l-1.4 1.4"/>
          </svg>
        </button>
      </div>
    </header>

    <!-- Example Tabs -->
    <div class="tabs-bar" id="example-tabs"></div>

    <!-- Main Split View -->
    <div class="split-container" id="split-container">
      <!-- Editor Pane -->
      <div class="pane pane-editor" id="pane-editor">
        <div class="pane-label">
          <div class="pane-label-dot"></div>
          <span id="editor-pane-title">Editor</span>
          <span class="kbd-hint"><kbd>Cmd</kbd><kbd>S</kbd> to run</span>
          <button class="compiled-toggle" id="btn-compiled" title="View the JavaScript the What compiler generates from this JSX">
            <svg width="12" height="12" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
              <polyline points="5 4 1 8 5 12"/>
              <polyline points="11 4 15 8 11 12"/>
            </svg>
            <span>Compiled output</span>
          </button>
        </div>
        <div class="editor-wrap">
          <div id="editor-container"></div>
          <pre id="compiled-container" class="compiled-output" hidden><code></code></pre>
        </div>
      </div>

      <!-- Splitter -->
      <div class="splitter" id="splitter"></div>

      <!-- Preview Pane -->
      <div class="pane pane-preview" id="pane-preview">
        <div class="pane-label">
          <div class="pane-label-dot" style="background: var(--success);"></div>
          Preview
        </div>
        <div class="preview-wrap">
          <div id="preview-container"></div>
        </div>
        <!-- Console -->
        <div class="console-panel" id="console-panel"></div>
      </div>
    </div>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
