<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>What Framework DX Testbed</title>
  <style>
    :root {
      --bg: #111827;
      --surface: #1f2937;
      --border: #374151;
      --text: #f3f4f6;
      --muted: #9ca3af;
      --accent: #6366f1;
      --accent-hover: #818cf8;
      --danger: #ef4444;
      --success: #22c55e;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
    #app { max-width: 900px; margin: 0 auto; padding: 32px 20px; }
    h1 { font-size: 24px; margin-bottom: 24px; }
    h2 { font-size: 18px; margin-bottom: 12px; color: var(--muted); font-weight: 500; }
    .section { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 20px; margin-bottom: 20px; }
    button { background: var(--accent); color: white; border: none; border-radius: 8px; padding: 8px 16px; font-size: 14px; cursor: pointer; font-family: inherit; }
    button:hover { background: var(--accent-hover); }
    input, select { background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 8px 12px; color: var(--text); font-size: 14px; font-family: inherit; outline: none; }
    input:focus, select:focus { border-color: var(--accent); }
    .flex { display: flex; gap: 12px; align-items: center; }
    .grid { display: grid; gap: 12px; }
    .text-muted { color: var(--muted); font-size: 13px; }
    .mt { margin-top: 12px; }
    .tag { font-size: 11px; padding: 2px 8px; border-radius: 4px; font-weight: 500; }
  </style>
</head>
<body>
  <div id="app"></div>
  <script type="module" src="/src/app.jsx"></script>
</body>
</html>
