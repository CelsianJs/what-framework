<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TaskBoard — WhatFW Demo</title>
  <style>
    :root, [data-theme="light"] {
      --bg: #ffffff;
      --bg-card: #f8f9fa;
      --bg-input: #ffffff;
      --text: #1a1a1a;
      --border: #e5e7eb;
      --accent: #3b82f6;
    }
    [data-theme="dark"] {
      --bg: #0f0f0f;
      --bg-card: #1a1a1a;
      --bg-input: #262626;
      --text: #e5e5e5;
      --border: #333;
      --accent: #3b82f6;
    }
    * { box-sizing: border-box; }
    body { margin: 0; background: var(--bg); transition: background 0.2s, color 0.2s; }
  </style>
</head>
<body>
  <div id="app"></div>
  <script type="module" src="./app.jsx"></script>
</body>
</html>
