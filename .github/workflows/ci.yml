name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium (for devtools-mcp e2e)
        run: npx playwright install --with-deps chromium

      - name: Test
        run: npm run -s test

  react-compat-libs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      # The lib fixture is gitignored and not a workspace member — install it here so
      # the compat pillar is actually exercised (the test FAILS, not skips, with the flag set).
      - name: Install compat-lib fixture
        working-directory: packages/react-compat/test/app
        run: npm install --no-save zustand @tanstack/react-query react-hook-form react-hot-toast @headlessui/react framer-motion

      - name: Run guarded compat-lib tests
        working-directory: packages/react-compat
        env:
          WHAT_REQUIRE_COMPAT_LIBS: '1'
        run: node --test 'test/libs.test.js'

  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run -s build

      - name: Production build smoke gate (no blank-screen regression)
        run: npm run -s test:prod

  scaffold-smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      # The SPA production build resolves the `production` export condition
      # to dist/*.min.js inside the packed tarballs, so build first.
      - name: Build packages
        run: npm run -s build

      - name: Install Playwright Chromium (hydration checks)
        run: npx playwright install --with-deps chromium

      - name: Scaffold smoke (create-what -> install -> run -> hydrate, both templates)
        env:
          WHAT_SMOKE_REQUIRE_BROWSER: 1
        run: npm run -s smoke:scaffold

  audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Publish surface hygiene
        run: npm run -s hygiene:publish

      - name: Security audit
        run: npm audit --audit-level=moderate

  bench-gate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Benchmark gate
        env:
          # GitHub-hosted runners are substantially slower/noisier than the
          # checked-in local baselines; keep CI as a catastrophic regression
          # guard while preserving stricter defaults for local release checks.
          WHAT_BENCH_TOLERANCE_CORE: 0.80
          WHAT_BENCH_TOLERANCE_DX: 0.85
        run: npm run -s bench:gate
