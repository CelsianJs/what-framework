name: Size

# Runs on Depot CI (.depot/workflows/) as of 2026-07-11 (Kirby's directive).
# This copy keeps workflow_dispatch as a manual fallback.
on:
  workflow_dispatch:

jobs:
  size:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build (production dist)
        run: node scripts/build.js

      - name: Check size budgets
        run: node scripts/check-size.mjs
