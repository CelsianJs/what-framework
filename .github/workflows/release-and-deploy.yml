name: Release And Deploy

on:
  workflow_dispatch:
    inputs:
      publish_packages:
        description: Publish packages to npm
        required: true
        default: true
        type: boolean
      deploy_web:
        description: Deploy configured web surfaces to Vercel
        required: true
        default: true
        type: boolean
      deploy_targets:
        description: Comma-separated deploy targets (empty = defaults in script)
        required: false
        default: ""
        type: string
      npm_tag:
        description: npm dist-tag for publish
        required: false
        default: latest
        type: string
      dry_run:
        description: Run without publishing/deploying
        required: true
        default: false
        type: boolean

concurrency:
  group: release-and-deploy-main
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      - name: Verify quality gates (correctness — blocking)
        # Every correctness gate from release:verify EXCEPT bench:gate. The
        # checked-in perf baselines are recorded on fast local hardware (M3 Max);
        # GitHub shared runners are several× slower on some microbenchmarks
        # (e.g. `batch() 100 writes`), so bench:gate false-fails here and must
        # not block a publish. Perf is still gated strictly by the dedicated
        # `bench-gate` job in ci.yml and by `release:verify` on local hardware.
        run: |
          npm run -s hygiene:publish
          npm run -s test
          npm run -s build
          npm run -s hygiene:publish
          npm run -s check:size
          npm run -s test:prod
          npm run -s smoke:scaffold

      - name: Benchmark gate (perf — non-blocking signal)
        continue-on-error: true
        env:
          WHAT_BENCH_TOLERANCE_CORE: 0.80
          WHAT_BENCH_TOLERANCE_DX: 0.85
        run: npm run -s bench:gate

      - name: Publish npm packages
        if: ${{ inputs.publish_packages }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          ARGS=()
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            ARGS+=(--dry-run)
          fi
          if [ -n "${{ inputs.npm_tag }}" ]; then
            ARGS+=(--tag "${{ inputs.npm_tag }}")
          fi
          node scripts/publish-packages.mjs "${ARGS[@]}"

      - name: Verify npm registry packages
        if: ${{ inputs.publish_packages && !inputs.dry_run }}
        run: npm run -s verify:registry

      - name: Upload registry smoke artifact
        if: ${{ always() && inputs.publish_packages && !inputs.dry_run }}
        uses: actions/upload-artifact@v4
        with:
          name: what-registry-smoke
          path: artifacts/registry-smoke.json
          if-no-files-found: error

      - name: Deploy Vercel targets
        if: ${{ inputs.deploy_web }}
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          ARGS=()
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            ARGS+=(--dry-run)
          fi
          if [ -n "${{ inputs.deploy_targets }}" ]; then
            ARGS+=(--targets "${{ inputs.deploy_targets }}")
          fi
          node scripts/deploy-vercel.mjs "${ARGS[@]}"
